<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Práctica de Audios Chinos</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #eef2f5; 
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.contenedor-practica {
    background: #ffffff;
    padding: 30px 40px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    width: 100%;
    max-width: 460px;
    text-align: center;
    box-sizing: border-box;
}

h2 {
    color: #333333;
    font-size: 22px;
    margin-top: 0;
    margin-bottom: 25px;
}

#respuesta {
    font-size: 24px;
    width: 100%;
    padding: 10px;
    text-align: center;
    border: 2px solid #ccd6dd;
    border-radius: 6px;
    outline: none;
    box-sizing: border-box;
    transition: border-color 0.2s;
}

#respuesta:focus {
    border-color: #4a90e2; 
}

button {
    font-size: 18px;
    padding: 12px 24px;
    margin: 15px 5px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: background-color 0.2s, transform 0.1s;
}

.btn-reproducir {
    background-color: #4a90e2;
    color: white;
    width: 100%;
    margin-bottom: 20px;
}

.btn-reproducir:hover {
    background-color: #357abd;
}

.btn-comprobar {
    background-color: #2ecc71;
    color: white;
    padding: 10px 30px;
}

.btn-comprobar:hover {
    background-color: #27ae60;
}

.btn-skip{
    background:#f39c12;
    color:white;
}

.btn-skip:hover{
    background:#d68910;
}

button:active {
    transform: scale(0.98);
}

#resultado {
    font-size: 22px;
    font-weight: bold;
    margin-top: 20px;
    min-height: 30px; 
}

.correcto { color: #2ecc71; }
.incorrecto { color: #e74c3c; }

#estado {
    margin-top: 25px;
    color: #7f8c8d;
    font-size: 14px;
    line-height: 1.4;
    border-top: 1px solid #edf2f7;
    padding-top: 15px;
}

@media (max-width:768px){
    .contenedor-practica{
        width:95%;
        max-width:none;
        padding:30px;
    }
    h2{ font-size:32px; }
    #respuesta{ font-size:34px; padding:18px; }
    button{ font-size:28px; padding:18px; }
    #resultado{ font-size:30px; }
    #estado{ font-size:22px; }
}
</style>
</head>

<body>

<div class="contenedor-practica">
    <h2>Escucha el audio y escribe el nombre del archivo</h2>
    <button class="btn-reproducir" onclick="reproducir()">▶ Reproducir Audio</button>
    <input id="respuesta" autocomplete="off" placeholder="Escribe aquí...">
    <button class="btn-comprobar" onclick="comprobar()">Comprobar</button>
    <button class="btn-skip" onclick="skip()">⏭ Skip</button>

    <div id="resultado"></div>
    <div id="estado">Cargando configuración...</div>
</div>

<script>
let lista = [];
let completados = []; // Guardará los nombres de los archivos ya acertados
let indice = 0;
let audio = null;

// 1. Intentar recuperar el progreso guardado en el navegador
const progresoGuardado = localStorage.getItem("audios_completados");
if (progresoGuardado) {
    completados = JSON.parse(progresoGuardado);
}

// Cargar el manifiesto
fetch("manifest.json")
.then(r => {
    if(!r.ok) throw new Error("No se encontró manifest.json");
    return r.json();
})
.then(data => {
    lista = data;
    
    // Asignar el evento Enter de forma segura
    document.getElementById("respuesta").addEventListener("keydown", function(e) {
        if(e.key === "Enter") comprobar();
    });

    // Buscar el primer audio disponible que no haya sido completado antes
    if (buscarSiguientePendiente()) {
        actualizarMarcador("¡Progreso recuperado!");
    }
})
.catch(err => {
    document.getElementById("estado").innerHTML = "<span style='color:#e74c3c'>ERROR cargando manifest.json</span><br>" + err;
});

// Busca un audio que no esté en la lista de completados
function buscarSiguientePendiente() {
    // Si ya completamos todos los que vienen en el JSON
    if (completados.length >= lista.length) {
        document.getElementById("estado").innerHTML = "🎉 ¡Terminaste todos los audios de la lista!";
        document.getElementById("resultado").innerHTML = "<button onclick='reiniciarProgreso()' style='background:#7f8c8d; color:white; font-size:16px;'>Reiniciar todo el progreso</button>";
        return false;
    }

    // Creamos una lista con los índices que aún no han sido completados
    let pendientes = [];
    for (let i = 0; i < lista.length; i++) {
        if (!completados.includes(lista[i])) {
            pendientes.push(i);
        }
    }

    // Seleccionamos uno al azar de los que quedan pendientes
    let indiceAleatorio = Math.floor(Math.random() * pendientes.length);
    indice = pendientes[indiceAleatorio];
    return true;
}

function actualizarMarcador(mensajeAdicional = "") {
    let texto = "Progreso de estudio: " + completados.length + " / " + lista.length;
    if (mensajeAdicional) {
        texto += "<br><small style='color:#4a90e2'>" + mensajeAdicional + "</small>";
    }
    document.getElementById("estado").innerHTML = texto;
}

function reproducir() {
    if(lista.length === 0) return;

    let archivo = lista[indice];
    actualizarMarcador("Cargando audio...");
    console.log("Reproduciendo para debug:", archivo); 

    if(audio) { audio.pause(); }
    audio = new Audio(archivo);

    audio.oncanplay = function(){
        actualizarMarcador("¡Audio listo! Escucha con atención.");
    }

    audio.onerror = function(){
        document.getElementById("estado").innerHTML = "<span style='color:#e74c3c'>No pudo cargarse el audio.</span><br> Archivo roto: " + archivo;
        alert("No se pudo abrir:\n" + archivo);
    }

    audio.play().catch(e => {
        document.getElementById("estado").innerHTML = "<span style='color:#e74c3c'>Error al reproducir:</span><br>" + e;
        console.error(e);
    });
}

function comprobar() {
    if(lista.length === 0) return;

    let inputRespuesta = document.getElementById("respuesta");
    let escrito = inputRespuesta.value.trim();
    let archivoActual = lista[indice];
    let correcto = archivoActual.replace(/\.[^/.]+$/, "");
    let contenedorResultado = document.getElementById("resultado");

    if(escrito.toLowerCase() === correcto.toLowerCase()){ 
        contenedorResultado.innerHTML = "<span class='correcto'>✅ ¡Correcto!</span>";
        inputRespuesta.value = "";
        
        // Registrar en la lista de completados si no estaba ya ahí
        if (!completados.includes(archivoActual)) {
            completados.push(archivoActual);
            // ¡Aquí guardamos el progreso en el navegador!
            localStorage.setItem("audios_completados", JSON.stringify(completados));
        }
        
        if(!buscarSiguientePendiente()){
            return;
        }
        
        setTimeout(reproducir, 1000); 
    } else {
        contenedorResultado.innerHTML = "<span class='incorrecto'>❌ Incorrecto</span><br><small>Era: " + correcto + "</small>";
    }

    inputRespuesta.focus();
}

function skip() {
    // El skip solo busca otro pendiente al azar, sin guardar nada en completados
    if(!buscarSiguientePendiente()) return;

    document.getElementById("resultado").innerHTML = "";
    document.getElementById("respuesta").value = "";
    reproducir();
    document.getElementById("respuesta").focus();
}

// Por si el usuario quiere volver a empezar de cero algún día
function reiniciarProgreso() {
    if (confirm("¿Seguro que quieres borrar tu progreso y empezar de cero?")) {
        localStorage.removeItem("audios_completados");
        completados = [];
        document.getElementById("resultado").innerHTML = "";
        buscarSiguientePendiente();
        reproducir();
    }
}
</script>

</body>
</html>
